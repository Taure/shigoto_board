name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v1
    permissions:
      contents: write
      pull-requests: write
    with:
      version-file: '.tool-versions'
      enable-ex-doc: true
      enable-audit: true
      enable-sbom: true
      enable-dependency-submission: true
      enable-summary: true
