name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@test/shigoto-board-fix
    permissions:
      contents: write
      pull-requests: write
    with:
      version-file: '.tool-versions'
      enable-eunit: false
      enable-ex-doc: false
      enable-audit: false
      enable-sbom: false
      enable-sbom-scan: false
      enable-dependency-submission: true
      enable-summary: true
